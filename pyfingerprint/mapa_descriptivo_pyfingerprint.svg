<text x="115" y="211" font-size="15" font-weight="700" fill="#173f66">¿PARA QUE SIRVE?</text>
<text x="65" y="240" font-size="12.5" fill="#3a4854">Comunica Python con sensores</text>
<text x="65" y="261" font-size="12.5" fill="#3a4854">opticos de huella digital R30x</text>
<text x="65" y="282" font-size="12.5" fill="#3a4854">conectados por puerto serie,</text>
<text x="65" y="303" font-size="12.5" fill="#3a4854">para registrar y comparar huellas.</text>
<rect x="490" y="170" width="430" height="170" rx="14" fill="#ffffff" filter="url(#shadow)"/>
<rect x="490" y="170" width="8" height="170" rx="4" fill="#2ea36b"/>
