<text x="480" y="1142" text-anchor="middle" font-size="16.5" font-weight="700" fill="#173f66">EJEMPLO PARA CORRER EN LA COMPUTADORA</text>
<rect x="400" y="1150" width="160" height="4" rx="2" fill="#4ecb85"/>
<rect x="40" y="1166" width="880" height="190" rx="14" fill="url(#codeGrad)" filter="url(#shadow)"/>
<circle cx="66" cy="1190" r="6" fill="#ff5f56"/>
<circle cx="86" cy="1190" r="6" fill="#ffbd2e"/>
<circle cx="106" cy="1190" r="6" fill="#27c93f"/>
<text x="480" y="1195" text-anchor="middle" font-size="11.5" fill="#8b98a5">pyfingerprint_practica.py</text>
<text x="65.0" y="1222" font-family="Consolas, 'Courier New', monospace" font-size="11.5" fill="#4ecb85">from pyfingerprint.pyfingerprint import \</text>
<text x="89.8" y="1240" font-family="Consolas, 'Courier New', monospace" font-size="11.5" fill="#4ecb85">PyFingerprint</text>
<text x="65.0" y="1258" font-family="Consolas, 'Courier New', monospace" font-size="11.5" fill="#ffd479">sensor = PyFingerprint('/dev/ttyUSB0', 57600)</text>
<text x="65.0" y="1276" font-family="Consolas, 'Courier New', monospace" font-size="11.5" fill="#ffd479">sensor.readImage()</text>
<text x="65.0" y="1294" font-family="Consolas, 'Courier New', monospace" font-size="11.5" fill="#ffd479">sensor.convertImage(0x01)</text>
<text x="65.0" y="1312" font-family="Consolas, 'Courier New', monospace" font-size="11.5" fill="#ffd479">posicion, puntaje = sensor.searchTemplate()</text>
<text x="480" y="1386" text-anchor="middle" font-size="10.5" fill="#93a1ac">Practica: pyfingerprint (requiere hardware)</text>
