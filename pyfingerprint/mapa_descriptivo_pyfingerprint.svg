<text x="565" y="211" font-size="15" font-weight="700" fill="#1d6b48">TIPOS DE OPERACION</text>
<circle cx="516" cy="236" r="3" fill="#2ea36b"/>
<text x="529" y="240" font-size="12.5" fill="#3a4854">Registro (enroll): guardar huella</text>
<circle cx="516" cy="255" r="3" fill="#2ea36b"/>
<text x="529" y="259" font-size="12.5" fill="#3a4854">Identificacion 1:N: buscar entre</text>
<text x="529" y="278" font-size="12.5" fill="#3a4854">todas las huellas guardadas</text>
<circle cx="516" cy="293" r="3" fill="#2ea36b"/>
<text x="529" y="297" font-size="12.5" fill="#3a4854">Verificacion 1:1: comparar dos</text>
<text x="529" y="316" font-size="12.5" fill="#3a4854">lecturas directamente</text>
<path d="M255,340 C255,382 420,396 480,410" stroke="#93a1ac" stroke-width="2" fill="none"/>
<path d="M705,340 C705,382 540,396 480,410" stroke="#93a1ac" stroke-width="2" fill="none"/>
<circle cx="480" cy="410" r="3.5" fill="#93a1ac"/>
<text x="480" y="432" text-anchor="middle" font-size="16.5" font-weight="700" fill="#173f66">¿COMO FUNCIONA? — PROCESO</text>
<rect x="420" y="440" width="120" height="4" rx="2" fill="#7c4dff"/>
<rect x="40" y="458" width="430" height="112" rx="14" fill="#ffffff" filter="url(#shadow)"/>
<rect x="40" y="458" width="8" height="112" rx="4" fill="#7c4dff"/>
<circle cx="72" cy="458" r="20" fill="#7c4dff" filter="url(#shadow)"/>
<text x="72" y="464" text-anchor="middle" font-size="15" fill="#ffffff" font-weight="700">1</text>
<text x="95" y="491" font-size="14" font-weight="700" fill="#4a2fa8">CONECTAR AL SENSOR</text>
<text x="65" y="514" font-size="11.5" fill="#3a4854">PyFingerprint(puerto,</text>
<text x="65" y="532" font-size="11.5" fill="#3a4854">baudrate) abre la conexion</text>
<text x="65" y="550" font-size="11.5" fill="#3a4854">serie con el sensor.</text>
<rect x="490" y="458" width="430" height="112" rx="14" fill="#ffffff" filter="url(#shadow)"/>
<rect x="490" y="458" width="8" height="112" rx="4" fill="#7c4dff"/>
<circle cx="522" cy="458" r="20" fill="#7c4dff" filter="url(#shadow)"/>
<text x="522" y="464" text-anchor="middle" font-size="15" fill="#ffffff" font-weight="700">2</text>
<text x="545" y="491" font-size="14" font-weight="700" fill="#4a2fa8">CAPTURAR IMAGEN</text>
<text x="515" y="514" font-size="11.5" fill="#3a4854">readImage() detecta cuando</text>
<text x="515" y="532" font-size="11.5" fill="#3a4854">se coloca un dedo y</text>
<text x="515" y="550" font-size="11.5" fill="#3a4854">captura su imagen optica.</text>
<rect x="490" y="640" width="430" height="112" rx="14" fill="#ffffff" filter="url(#shadow)"/>
<rect x="490" y="640" width="8" height="112" rx="4" fill="#7c4dff"/>
<circle cx="522" cy="640" r="20" fill="#7c4dff" filter="url(#shadow)"/>
<text x="522" y="646" text-anchor="middle" font-size="15" fill="#ffffff" font-weight="700">3</text>
<text x="545" y="673" font-size="14" font-weight="700" fill="#4a2fa8">EXTRAER CARACTERISTICAS</text>
<text x="515" y="696" font-size="11.5" fill="#3a4854">convertImage() transforma la</text>
<text x="515" y="714" font-size="11.5" fill="#3a4854">imagen en minucias (patron</text>
<text x="515" y="732" font-size="11.5" fill="#3a4854">de crestas de la huella).</text>
<rect x="40" y="640" width="430" height="112" rx="14" fill="#ffffff" filter="url(#shadow)"/>
<rect x="40" y="640" width="8" height="112" rx="4" fill="#7c4dff"/>
<circle cx="72" cy="640" r="20" fill="#7c4dff" filter="url(#shadow)"/>
<text x="72" y="646" text-anchor="middle" font-size="15" fill="#ffffff" font-weight="700">4</text>
<text x="95" y="673" font-size="14" font-weight="700" fill="#4a2fa8">ALMACENAR / COMPARAR</text>
<text x="65" y="696" font-size="11.5" fill="#3a4854">storeTemplate() guarda o</text>
<text x="65" y="714" font-size="11.5" fill="#3a4854">searchTemplate() compara</text>
<text x="65" y="732" font-size="11.5" fill="#3a4854">contra la base de huellas.</text>
