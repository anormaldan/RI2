<circle cx="500" cy="929" r="3.2" fill="#f2a93b"/>
<text x="513" y="933" font-size="12.5" fill="#3a4854">Comparar dos lecturas (1:1)</text>
<circle cx="500" cy="957" r="3.2" fill="#f2a93b"/>
<text x="513" y="961" font-size="12.5" fill="#3a4854">Eliminar plantilla / vaciar base</text>
