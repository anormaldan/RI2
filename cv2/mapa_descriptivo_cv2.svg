<text x="480" y="432" text-anchor="middle" font-size="16.5" font-weight="700" fill="#173f66">¿COMO FUNCIONA? — PROCESO</text>
<rect x="420" y="440" width="120" height="4" rx="2" fill="#7c4dff"/>
<rect x="40" y="458" width="430" height="112" rx="14" fill="#ffffff" filter="url(#shadow)"/>
<rect x="40" y="458" width="8" height="112" rx="4" fill="#7c4dff"/>
<circle cx="72" cy="458" r="20" fill="#7c4dff" filter="url(#shadow)"/>
<text x="72" y="464" text-anchor="middle" font-size="15" fill="#ffffff" font-weight="700">1</text>
<text x="95" y="491" font-size="14" font-weight="700" fill="#4a2fa8">CARGAR/CREAR IMAGEN</text>
<text x="65" y="514" font-size="11.5" fill="#3a4854">La imagen se representa</text>
<text x="65" y="532" font-size="11.5" fill="#3a4854">como una matriz de NumPy</text>
<text x="65" y="550" font-size="11.5" fill="#3a4854">(alto x ancho x color).</text>
<rect x="490" y="458" width="430" height="112" rx="14" fill="#ffffff" filter="url(#shadow)"/>
<rect x="490" y="458" width="8" height="112" rx="4" fill="#7c4dff"/>
<circle cx="522" cy="458" r="20" fill="#7c4dff" filter="url(#shadow)"/>
<text x="522" y="464" text-anchor="middle" font-size="15" fill="#ffffff" font-weight="700">2</text>
<text x="545" y="491" font-size="14" font-weight="700" fill="#4a2fa8">APLICAR FILTROS</text>
<text x="515" y="514" font-size="11.5" fill="#3a4854">Se aplican transformaciones:</text>
<text x="515" y="532" font-size="11.5" fill="#3a4854">color, desenfoque, bordes,</text>
<text x="515" y="550" font-size="11.5" fill="#3a4854">umbralizacion, etc.</text>
<rect x="490" y="640" width="430" height="112" rx="14" fill="#ffffff" filter="url(#shadow)"/>
<rect x="490" y="640" width="8" height="112" rx="4" fill="#7c4dff"/>
<circle cx="522" cy="640" r="20" fill="#7c4dff" filter="url(#shadow)"/>
<text x="522" y="646" text-anchor="middle" font-size="15" fill="#ffffff" font-weight="700">3</text>
<text x="545" y="673" font-size="14" font-weight="700" fill="#4a2fa8">OBTENER NUEVA MATRIZ</text>
<text x="515" y="696" font-size="11.5" fill="#3a4854">Cada operacion genera una</text>
<text x="515" y="714" font-size="11.5" fill="#3a4854">nueva matriz de resultado</text>
<text x="515" y="732" font-size="11.5" fill="#3a4854">sobre la original.</text>
<rect x="40" y="640" width="430" height="112" rx="14" fill="#ffffff" filter="url(#shadow)"/>
<rect x="40" y="640" width="8" height="112" rx="4" fill="#7c4dff"/>
<circle cx="72" cy="640" r="20" fill="#7c4dff" filter="url(#shadow)"/>
<text x="72" y="646" text-anchor="middle" font-size="15" fill="#ffffff" font-weight="700">4</text>
<text x="95" y="673" font-size="14" font-weight="700" fill="#4a2fa8">MOSTRAR / ANALIZAR</text>
<text x="65" y="696" font-size="11.5" fill="#3a4854">El resultado se muestra,</text>
<text x="65" y="714" font-size="11.5" fill="#3a4854">guarda o se usa para</text>
<text x="65" y="732" font-size="11.5" fill="#3a4854">seguir procesando.</text>
