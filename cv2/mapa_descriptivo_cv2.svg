<text x="115" y="211" font-size="15" font-weight="700" fill="#173f66">¿PARA QUE SIRVE?</text>
<text x="65" y="240" font-size="12.5" fill="#3a4854">Binding de Python para OpenCV:</text>
<text x="65" y="261" font-size="12.5" fill="#3a4854">leer, transformar y analizar</text>
<text x="65" y="282" font-size="12.5" fill="#3a4854">imagenes y video (bordes, formas,</text>
<text x="65" y="303" font-size="12.5" fill="#3a4854">colores, rostros, movimiento).</text>
<rect x="490" y="170" width="430" height="170" rx="14" fill="#ffffff" filter="url(#shadow)"/>
<rect x="490" y="170" width="8" height="170" rx="4" fill="#2ea36b"/>
