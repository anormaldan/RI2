<circle cx="500" cy="901" r="3.2" fill="#f2a93b"/>
<text x="513" y="905" font-size="12.5" fill="#3a4854">Deteccion de contornos y formas</text>
<circle cx="500" cy="929" r="3.2" fill="#f2a93b"/>
<text x="513" y="933" font-size="12.5" fill="#3a4854">Dibujo de figuras y texto</text>
<circle cx="500" cy="957" r="3.2" fill="#f2a93b"/>
<text x="513" y="961" font-size="12.5" fill="#3a4854">Deteccion de rostros (cascada)</text>
<circle cx="500" cy="985" r="3.2" fill="#f2a93b"/>
<text x="513" y="989" font-size="12.5" fill="#3a4854">Transformaciones geometricas</text>
<circle cx="500" cy="1013" r="3.2" fill="#f2a93b"/>
<text x="513" y="1017" font-size="12.5" fill="#3a4854">Calculo de areas y bounding boxes</text>
