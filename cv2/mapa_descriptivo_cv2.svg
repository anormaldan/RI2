<text x="565" y="211" font-size="15" font-weight="700" fill="#1d6b48">OPERACIONES BASICAS</text>
<circle cx="516" cy="236" r="3" fill="#2ea36b"/>
<text x="529" y="240" font-size="12.5" fill="#3a4854">Lectura/escritura (imread/imwrite)</text>
<circle cx="516" cy="255" r="3" fill="#2ea36b"/>
<text x="529" y="259" font-size="12.5" fill="#3a4854">Conversion de color (cvtColor)</text>
<circle cx="516" cy="274" r="3" fill="#2ea36b"/>
<text x="529" y="278" font-size="12.5" fill="#3a4854">Filtrado y desenfoque (GaussianBlur)</text>
<circle cx="516" cy="293" r="3" fill="#2ea36b"/>
<text x="529" y="297" font-size="12.5" fill="#3a4854">Deteccion de bordes (Canny)</text>
