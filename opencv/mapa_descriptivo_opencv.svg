<text x="115" y="211" font-size="15" font-weight="700" fill="#173f66">¿PARA QUE SIRVE?</text>
<text x="65" y="240" font-size="12.5" fill="#3a4854">Va mas alla del procesamiento</text>
<text x="65" y="261" font-size="12.5" fill="#3a4854">basico: usa modelos entrenados</text>
<text x="65" y="282" font-size="12.5" fill="#3a4854">(Haar) para detectar objetos y</text>
<text x="65" y="303" font-size="12.5" fill="#3a4854">segmenta imagenes por color (HSV).</text>
