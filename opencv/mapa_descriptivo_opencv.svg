<text x="72" y="464" text-anchor="middle" font-size="15" fill="#ffffff" font-weight="700">1</text>
<text x="95" y="491" font-size="14" font-weight="700" fill="#4a2fa8">CARGAR CLASIFICADOR</text>
<text x="65" y="514" font-size="11.5" fill="#3a4854">Se carga un modelo Haar</text>
<text x="65" y="532" font-size="11.5" fill="#3a4854">preentrenado incluido en</text>
<text x="65" y="550" font-size="11.5" fill="#3a4854">OpenCV.</text>
<rect x="490" y="458" width="430" height="112" rx="14" fill="#ffffff" filter="url(#shadow)"/>
<rect x="490" y="458" width="8" height="112" rx="4" fill="#7c4dff"/>
<circle cx="522" cy="458" r="20" fill="#7c4dff" filter="url(#shadow)"/>
<text x="522" y="464" text-anchor="middle" font-size="15" fill="#ffffff" font-weight="700">2</text>
<text x="545" y="491" font-size="14" font-weight="700" fill="#4a2fa8">DETECTAR PATRONES</text>
<text x="515" y="514" font-size="11.5" fill="#3a4854">detectMultiScale busca el</text>
<text x="515" y="532" font-size="11.5" fill="#3a4854">patron en distintas escalas</text>
<text x="515" y="550" font-size="11.5" fill="#3a4854">sobre la imagen en grises.</text>
<rect x="490" y="640" width="430" height="112" rx="14" fill="#ffffff" filter="url(#shadow)"/>
<rect x="490" y="640" width="8" height="112" rx="4" fill="#7c4dff"/>
<circle cx="522" cy="640" r="20" fill="#7c4dff" filter="url(#shadow)"/>
<text x="522" y="646" text-anchor="middle" font-size="15" fill="#ffffff" font-weight="700">3</text>
<text x="545" y="673" font-size="14" font-weight="700" fill="#4a2fa8">CONVERTIR A HSV</text>
<text x="515" y="696" font-size="11.5" fill="#3a4854">Para color, se convierte la</text>
<text x="515" y="714" font-size="11.5" fill="#3a4854">imagen a HSV (matiz,</text>
<text x="515" y="732" font-size="11.5" fill="#3a4854">saturacion, valor).</text>
<rect x="40" y="640" width="430" height="112" rx="14" fill="#ffffff" filter="url(#shadow)"/>
<rect x="40" y="640" width="8" height="112" rx="4" fill="#7c4dff"/>
<circle cx="72" cy="640" r="20" fill="#7c4dff" filter="url(#shadow)"/>
<text x="72" y="646" text-anchor="middle" font-size="15" fill="#ffffff" font-weight="700">4</text>
<text x="95" y="673" font-size="14" font-weight="700" fill="#4a2fa8">AISLAR / MEDIR</text>
<text x="65" y="696" font-size="11.5" fill="#3a4854">inRange crea una mascara y</text>
<text x="65" y="714" font-size="11.5" fill="#3a4854">se calcula el centroide del</text>
<text x="65" y="732" font-size="11.5" fill="#3a4854">objeto detectado.</text>
