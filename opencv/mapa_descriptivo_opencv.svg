<text x="480" y="1195" text-anchor="middle" font-size="11.5" fill="#8b98a5">opencv_practica.py</text>
<text x="65.0" y="1222" font-family="Consolas, 'Courier New', monospace" font-size="11.5" fill="#4ecb85">face_cascade = cv2.CascadeClassifier(</text>
<text x="89.8" y="1240" font-family="Consolas, 'Courier New', monospace" font-size="11.5" fill="#4ecb85">cv2.data.haarcascades +</text>
<text x="89.8" y="1258" font-family="Consolas, 'Courier New', monospace" font-size="11.5" fill="#4ecb85">'haarcascade_frontalface_default.xml')</text>
<text x="65.0" y="1276" font-family="Consolas, 'Courier New', monospace" font-size="11.5" fill="#ffd479">faces = face_cascade.detectMultiScale(gray)</text>
<text x="65.0" y="1294" font-family="Consolas, 'Courier New', monospace" font-size="11.5" fill="#ffd479">mask = cv2.inRange(hsv, lower_red, upper_red)</text>
<text x="480" y="1368" text-anchor="middle" font-size="10.5" fill="#93a1ac">Practica: OpenCV</text>
